name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore, build, and test
        run: |
          dotnet restore ExcelRenderer.sln
          dotnet test ExcelRenderer.sln -c Release --verbosity minimal
